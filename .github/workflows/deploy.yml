name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: battle-plan/package-lock.json

      - name: Install dependencies
        working-directory: battle-plan
        run: npm ci

      - name: Lint
        working-directory: battle-plan
        run: npm run lint

      - name: Build
        working-directory: battle-plan
        run: npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: battle-plan/dist
          branch: gh-pages
